services:
  api:
    build:
      context: ./src/SecurePlatformLab
      dockerfile: SecurePlatformLab.Api/Dockerfile
    container_name: secure-platform-lab-api
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080

  frontend:
    build:
      context: ./src/SecurePlatformLab
      dockerfile: SecurePlatformLab.Frontend/Dockerfile
    container_name: secure-platform-lab-frontend
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ApiSettings__BaseUrl: http://api:8080
    depends_on:
      - api